<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的鸿蒙应用</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f5f5f5;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      min-height: 100vh;
      padding: 28px 16px 56px;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      object-fit: cover;
      flex-shrink: 0;
      background: #f0f0f0;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 7px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 12px;
      color: #555555;
      background: #ebebeb;
      border-radius: 20px;
      padding: 2px 10px;
    }

    .card-desc {
      font-size: 14px;
      color: #666666;
      line-height: 1.55;
    }

    .card-footer {
      margin-top: 14px;
      text-align: right;
    }

    .btn {
      display: inline-block;
      background: #1a1a1a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      padding: 9px 20px;
      border-radius: 20px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>我的鸿蒙应用</h1>
    <div id="app-list"></div>
  </div>

  <script>
    fetch('apps.json')
      .then(function(r) { return r.json(); })
      .then(function(apps) {
        var list = document.getElementById('app-list');
        apps.forEach(function(app) {
          var card = document.createElement('div');
          card.className = 'card';

          var cardTop = document.createElement('div');
          cardTop.className = 'card-top';

          var img = document.createElement('img');
          img.className = 'card-icon';
          img.src = app.icon;
          img.alt = app.name;

          var info = document.createElement('div');
          info.className = 'card-info';

          var name = document.createElement('div');
          name.className = 'card-name';
          name.textContent = app.name;

          var tags = document.createElement('div');
          tags.className = 'tags';
          app.tags.forEach(function(t) {
            var span = document.createElement('span');
            span.className = 'tag';
            span.textContent = t;
            tags.appendChild(span);
          });

          var desc = document.createElement('div');
          desc.className = 'card-desc';
          desc.textContent = app.description;

          info.appendChild(name);
          info.appendChild(tags);
          info.appendChild(desc);
          cardTop.appendChild(img);
          cardTop.appendChild(info);

          var footer = document.createElement('div');
          footer.className = 'card-footer';

          var btn = document.createElement('a');
          btn.className = 'btn';
          btn.href = 'https://appgallery.huawei.com/app/detail?id=' + app.bundleName;
          btn.target = '_blank';
          btn.rel = 'noopener';
          btn.textContent = '在应用市场查看';

          footer.appendChild(btn);
          card.appendChild(cardTop);
          card.appendChild(footer);
          list.appendChild(card);
        });
      })
      .catch(function(e) { console.error('Failed to load apps.json:', e); });
  </script>
</body>
</html>
